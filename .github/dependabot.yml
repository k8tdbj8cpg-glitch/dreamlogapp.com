version: 2
updates:
  # Automatically update npm / pnpm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    groups:
      # Bundle all patch updates into one PR
      patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
      # Bundle all minor updates into one PR
      minor-updates:
        patterns:
          - "*"
        update-types:
          - "minor"

  # Keep GitHub Actions up-to-date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "github-actions"
      - "automated"

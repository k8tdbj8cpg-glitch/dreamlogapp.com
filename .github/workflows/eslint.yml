# Lint workflow using Biome (ultracite) — the linter configured for this project.
# ESLint is not used; linting and formatting are handled by Biome 2 via the
# ultracite preset (see biome.jsonc and package.json "lint" / "format" scripts).

name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '29 4 * * 1'

jobs:
  lint:
    name: Run Biome lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint
